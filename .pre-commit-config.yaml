default_language_version:
  python: python3.13

default_stages:
  - pre-push

repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format --diff
        language: system
        pass_filenames: true
        types: ["python"]

      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        pass_filenames: true
        types: ["python"]
        exclude: "(tests/|output/|migrations/)"

      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check
        language: system
        pass_filenames: true
        types: ["python"]
